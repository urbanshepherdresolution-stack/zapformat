<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to Markdown Converter - ZapTextCleaner</title>
    
    <!-- INSERT YOUR GOOGLE ANALYTICS TAGS HERE -->
    
    <!-- Mammoth.js extracts clean text and formatting from DOCX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <!-- Turndown.js converts that extracted structure into Markdown -->
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            color: #333;
        }
        /* Corporate Navy Theme Integration */
        h2 {
            color: #000080;
        }
        .drop-zone { 
            border: 2px dashed #000080; 
            padding: 50px; 
            text-align: center; 
            background: #f4f7fb; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: background 0.2s;
            font-weight: 500;
        }
        .drop-zone:hover { background: #e6ebf2; }
        button { 
            background: #000080; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 4px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background: #000050; }
        #status { margin-top: 20px; font-weight: 500; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #000080;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Link back to your main grid -->
    <a href="index.html" class="back-link">← Back to ZapTextCleaner</a>

    <h2>Word to Markdown Converter</h2>
    <p>Convert large .docx files instantly in your browser. 100% private and secure.</p>

    <!-- Upload Interface -->
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        Click here to upload your Word document (.docx)
    </div>
    <input type="file" id="fileInput" accept=".docx" style="display: none;">

    <div id="status"></div>
    <button id="downloadBtn" style="display: none;">Download Markdown (.md)</button>

    <script>
        let markdownResult = "";
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const turndownService = new TurndownService({ headingStyle: 'atx' });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // FIX: This clears the file from memory so the button works every single time!
            e.target.value = '';

            status.style.color = "#333";
            status.innerText = "Reading document... parsing pages.";
            downloadBtn.style.display = 'none';

            const reader = new FileReader();
            
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                
                mammoth.convertToHtml({arrayBuffer: arrayBuffer})
                    .then(function(result) {
                        status.innerText = "Converting layout to Markdown...";
                        
                        const html = result.value;
                        markdownResult = turndownService.turndown(html);
                        
                        status.style.color = "green";
                        status.innerText = "Success! Conversion complete.";
                        downloadBtn.style.display = 'inline-block';
                    })
                    .catch(function(err) {
                        status.style.color = "red";
                        status.innerText = "Error parsing document: " + err.message;
                    });
            };
            
            reader.readAsArrayBuffer(file);
        });

        downloadBtn.addEventListener('click', function() {
            const blob = new Blob([markdownResult], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.href = url;
            // Name the file based on the original upload, but wrap it in a fallback just in case
            const originalName = (fileInput.files && fileInput.files[0]) ? fileInput.files[0].name.replace('.docx', '') : 'converted_document';
            a.download = originalName + '.md';
            
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
