<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word to Markdown Converter - ZapTextCleaner</title>
    
    <!-- INSERT YOUR GOOGLE ANALYTICS TAGS HERE -->
    
    <!-- We only need Mammoth.js now - it is much faster on its own -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 20px; 
            color: #333;
        }
        /* Corporate Navy Theme Integration */
        h2 {
            color: #000080;
        }
        .drop-zone { 
            border: 2px dashed #000080; 
            padding: 50px; 
            text-align: center; 
            background: #f4f7fb; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: background 0.2s;
            font-weight: 500;
        }
        .drop-zone:hover { background: #e6ebf2; }
        button { 
            background: #000080; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 4px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background: #000050; }
        #status { margin-top: 20px; font-weight: 500; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #000080;
            text-decoration: none;
            font-weight: bold;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <!-- Link back to your main grid -->
    <a href="index.html" class="back-link">← Back to ZapTextCleaner</a>

    <h2>Word to Markdown Converter</h2>
    <p>Extract pure text from .docx files instantly in your browser.</p>

    <!-- Upload Interface -->
    <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
        Click here to upload your Word document (.docx)
    </div>
    <input type="file" id="fileInput" accept=".docx" style="display: none;">

    <div id="status"></div>
    <button id="downloadBtn" style="display: none;">Download Markdown (.md)</button>

    <script>
        let markdownResult = "";
        let uploadedFileName = "converted_document"; 
        
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // 1. Safety check for old .doc files
            if (file.name.toLowerCase().endsWith('.doc')) {
                status.style.color = "red";
                status.innerText = "Oops! This tool needs a '.docx' file. A regular '.doc' file is too old for the browser to read.";
                e.target.value = ''; 
                downloadBtn.style.display = 'none';
                return;
            }

            // 2. Save the name and clear the memory so you can upload again
            uploadedFileName = file.name.replace('.docx', '');
            e.target.value = '';

            status.style.color = "#333";
            status.innerText = "Grabbing pure text from the document...";
            downloadBtn.style.display = 'none';

            const reader = new FileReader();
            
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                
                // 3. We use extractRawText to ignore formatting and just get the words
                mammoth.extractRawText({arrayBuffer: arrayBuffer})
                    .then(function(result) {
                        const rawText = result.value;
                        
                        // Add some spacing between paragraphs so the AI can read it easily
                        markdownResult = rawText.split('\n').join('\n\n');
                        
                        status.style.color = "green";
                        status.innerText = "Success! Text extracted cleanly.";
                        downloadBtn.style.display = 'inline-block';
                    })
                    .catch(function(err) {
                        status.style.color = "red";
                        status.innerText = "Error reading document: " + err.message;
                    });
            };
            
            reader.readAsArrayBuffer(file);
        });

        // 4. Download the file as an .md document
        downloadBtn.addEventListener('click', function() {
            const blob = new Blob([markdownResult], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.href = url;
            a.download = uploadedFileName + '.md';
            
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
