<script>
        let markdownResult = "";
        let uploadedFileName = "converted_document"; 
        
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const turndownService = new TurndownService({ headingStyle: 'atx' });

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            uploadedFileName = file.name.replace('.docx', '');
            e.target.value = ''; // Clear memory so you can upload again

            status.style.color = "#333";
            status.innerText = "Reading document... cutting into bite-sized pieces...";
            downloadBtn.style.display = 'none';

            const reader = new FileReader();
            
            reader.onload = function(event) {
                const arrayBuffer = event.target.result;
                
                // Ignore heavy pictures
                const options = {
                    convertImage: mammoth.images.imgElement(function(image) {
                        return Promise.resolve({src: ""}); 
                    })
                };
                
                mammoth.convertToHtml({arrayBuffer: arrayBuffer}, options)
                    .then(function(result) {
                        status.innerText = "Converting layout to Markdown piece by piece...";
                        
                        // This is the Giant Spaghetti Noodle
                        const giantHtmlText = result.value;
                        
                        // 1. Cut the noodle every time a paragraph ends (</p>)
                        const biteSizedPieces = giantHtmlText.split('</p>');
                        
                        markdownResult = "";
                        
                        // 2. Feed the pieces to the converter one by one
                        for (let i = 0; i < biteSizedPieces.length; i++) {
                            // Only convert if the piece isn't completely empty
                            if (biteSizedPieces[i].trim() !== "") {
                                // Add the piece, plus the paragraph tag back, and add some spacing
                                markdownResult += turndownService.turndown(biteSizedPieces[i] + '</p>') + "\n\n";
                            }
                        }
                        
                        // 3. We are done!
                        status.style.color = "green";
                        status.innerText = "Success! Conversion complete.";
                        downloadBtn.style.display = 'inline-block';
                    })
                    .catch(function(err) {
                        status.style.color = "red";
                        status.innerText = "Error parsing document: " + err.message;
                    });
            };
            
            reader.readAsArrayBuffer(file);
        });

        downloadBtn.addEventListener('click', function() {
            const blob = new Blob([markdownResult], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            
            a.href = url;
            a.download = uploadedFileName + '.md';
            
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
