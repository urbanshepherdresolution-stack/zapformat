<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Audio to Video Compiler - 100% Free Online Utility</title>
    <style>
        :root { --primary: #1e3a8a; --primary-hover: #172554; --dark: #0f172a; --secondary: #64748b; --border: #e2e8f0; --success: #10b981; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; color: var(--dark); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .panel { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; }
        input[type="file"] { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .btn { background: var(--success); color: white; border: none; padding: 14px 24px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; font-size: 16px; }
        .btn:hover { background: #059669; }
        
        /* New Live Progress Indicators */
        .status-container { margin-top: 20px; display: none; text-align: center; }
        .status-text { font-weight: bold; color: #4f46e5; font-size: 14px; margin-bottom: 8px; }
        .progress-bar { height: 10px; width: 100%; background: #e2e8f0; border-radius: 5px; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Instant Audio to Video Compiler</h1>
        <p>Wrap background audio tracks with custom cover designs inside high-speed hardware video containers.</p>
    </header>
    <div class="panel">
        <div class="field">
            <label>Select Audio Track (.mp3, .wav)</label>
            <input type="file" id="audioAsset" accept="audio/*">
        </div>
        <div class="field">
            <label>Select Cover Presentation Art (.jpg, .png)</label>
            <input type="file" id="imageAsset" accept="image/*">
        </div>
        <button class="btn" onclick="executeHighSpeedCompilation()">Generate Video Presentation</button>
        
        <div id="progressWrapper" class="status-container">
            <div id="statusReport" class="status-text">Initializing execution loops...</div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>
    </div>
</div>

<script>
    async function executeHighSpeedCompilation() {
        const audioFile = document.getElementById('audioAsset').files[0];
        const imageFile = document.getElementById('imageAsset').files[0];
        const wrapper = document.getElementById('progressWrapper');
        const status = document.getElementById('statusReport');
        const fill = document.getElementById('progressFill');

        if (!audioFile || !imageFile) {
            alert('Please pick both file parameters first.');
            return;
        }

        // Unroll the visual tracker framework panel
        wrapper.style.display = 'block';
        fill.style.width = '0%';
        status.textContent = "⚡ Syncing media parameters directly into local stream wrappers...";

        const audioUrl = URL.createObjectURL(audioFile);
        const imageUrl = URL.createObjectURL(imageFile);

        const img = new Image();
        img.src = imageUrl;
        await new Promise(res => img.onload = res);

        const canvas = document.createElement('canvas');
        canvas.width = 1280;
        canvas.height = 720;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 1280, 720);

        const videoStream = canvas.captureStream(0); 
        const audioEl = new Audio(audioUrl);
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaElementSource(audioEl);
        const dest = audioCtx.createMediaStreamDestination();
        source.connect(dest);
        
        dest.stream.getAudioTracks().forEach(track => videoStream.addTrack(track));

        let options = { mimeType: 'video/webm;codecs=vp8,opus' };
        if (MediaRecorder.isTypeSupported('video/mp4;codecs=avc1,mp4a')) {
            options = { mimeType: 'video/mp4;codecs=avc1,mp4a' };
        }

        const recorder = new MediaRecorder(videoStream, options);
        const segments = [];
        
        recorder.ondataavailable = e => segments.push(e.data);
        recorder.onstop = () => {
            status.textContent = "✅ Video Generation Complete!";
            fill.style.width = '100%';
            
            const fileBlob = new Blob(segments, { type: options.mimeType });
            const downloadUrl = URL.createObjectURL(fileBlob);
            
            const element = document.createElement('a');
            element.href = downloadUrl;
            element.download = audioFile.name.replace(/\.[^/.]+$/, "") + "_presentation.mp4";
            element.click();
            audioCtx.close();
        };

        // Listen for metadata loading to accurately register total track duration lengths
        audioEl.onloadedmetadata = () => {
            const duration = audioEl.duration;
            
            recorder.start();
            audioEl.play();

            // Run an execution loop interval to calculate percent completion parameters
            const trackingInterval = setInterval(() => {
                if (audioEl.currentTime && duration) {
                    const percent = Math.round((audioEl.currentTime / duration) * 100);
                    fill.style.width = `${percent}%`;
                    status.textContent = `⏳ Compiling Video Framework Structure: ${percent}% Complete`;
                }

                if (audioEl.ended || audioEl.paused) {
                    clearInterval(trackingInterval);
                    recorder.stop();
                    audioEl.pause();
                }
            }, 50);
        };
    }
</script>
</body>
</html>
