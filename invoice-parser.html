<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7TP5H35738"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7TP5H35738');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Invoice to CSV Parser - PDF & Image OCR Converter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { --primary: #1e3a8a; --primary-hover: #172554; --dark: #0f172a; --secondary: #64748b; --border: #e2e8f0; --success: #10b981; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f8fafc; color: var(--dark); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
        .panel { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .upload-zone { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; background: #fafafa; margin-bottom: 15px; }
        .upload-zone:hover { border-color: var(--primary); background: #f0fdf4; }
        textarea { width: 100%; height: 180px; padding: 12px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-family: monospace; resize: vertical; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 15px; }
        .btn:hover { background: var(--primary-hover); }
        .output-box { background: #f1f5f9; border: 1px solid var(--border); padding: 15px; border-radius: 6px; font-family: monospace; overflow-x: auto; white-space: pre-wrap; height: 300px; box-sizing: border-box; }
        .status { font-weight: bold; color: #4f46e5; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Smart Invoice to Ledger Parser</h1>
        <p>Drop PDFs, images, or raw text to isolate financial line variables instantly inside your local sandbox.</p>
    </header>
    <div class="grid">
        <div class="panel">
            <h3>Step 1: Input Document Source</h3>
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <span style="font-size:32px;">📊</span>
                <p>Upload PDF, Receipt Image, or Document Photo</p>
                <input type="file" id="fileInput" accept="image/*,.pdf" style="display:none;" onchange="processIncomingFile()">
            </div>
            <div id="statusIndicator" class="status">Initializing...</div>
            
            <textarea id="invoiceInput" placeholder="Or paste raw text blocks here manually..."></textarea>
            <button class="btn" onclick="parseInvoiceText()">Extract Data Parameters</button>
        </div>
        <div class="panel">
            <h3>Step 2: Structured Accounting Output</h3>
            <div id="invoiceOutput" class="output-box">No data extracted yet.</div>
            <button class="btn" style="background:#10b981;" onclick="downloadCSV()">Download Clean CSV Ledger</button>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
    let csvContent = "";

    async function processIncomingFile() {
        const file = document.getElementById('fileInput').files[0];
        if (!file) return;

        const status = document.getElementById('statusIndicator');
        status.style.display = 'block';

        if (file.type === "application/pdf") {
            status.innerHTML = "⏳ <span>Stage 1/2: Mapping PDF Document Tree...</span>";
            const fileReader = new FileReader();
            fileReader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    
                    status.innerHTML = "⏳ <span>Stage 2/2: Slicing Text Streams into Vectors...</span>";
                    const page = await pdf.getPage(1);
                    const textContent = await page.getTextContent();
                    textContent.items.forEach(item => { fullText += item.str + " "; });
                    
                    document.getElementById('invoiceInput').value = fullText;
                    status.innerHTML = "<span style='color:var(--success);'>✅ Text Layers Successfully Extracted!</span>";
                    parseInvoiceText();
                } catch (err) {
                    status.innerHTML = "<span style='color:#dc2626;'>❌ Direct text reading failed. Please use an image copy.</span>";
                }
            };
            fileReader.readAsArrayBuffer(file);
        } else {
            status.innerHTML = "⏳ <span>Stage 1/2: Loading Local OCR Canvas...</span>";
            Tesseract.recognize(file, 'eng', {
                logger: m => {
                    if(m.status === 'recognizing text') {
                        status.innerHTML = `⚡ <span>Stage 2/2: Optical Scan Progress: ${Math.round(m.progress * 100)}%</span>`;
                    }
                }
            })
            .then(({ data: { text } }) => {
                document.getElementById('invoiceInput').value = text;
                status.innerHTML = "<span style='color:var(--success);'>✅ Image OCR Scan Complete!</span>";
                parseInvoiceText();
            })
            .catch(err => { status.innerHTML = "<span style='color:#dc2626;'>❌ Error processing image framework.</span>"; });
        }
    }

    function parseInvoiceText() {
        const text = document.getElementById('invoiceInput').value;
        
        // Comprehensive accounting variation expressions
        const vendorPatterns = /(?:vendor|from|company|supplier|service provider|issued by|merchant)[:\s\n]+([^\n\d]+)/i;
        const datePatterns = /(?:date|inv-date|billing date|date of issue|issued)[:\s\n]+([0-9\-\/A-Za-z\s,]+)/i;
        const totalPatterns = /(?:total|amount due|grand total|balance|total amount|due|invoice total|charges|payable)[:\s\$\u20AC\u00A3]+([0-9,]+\.[0-9]{2}|[0-9,]+)/i;
        const taxPatterns = /(?:tax|vat|gst|sales tax|estimated tax)[:\s\$\u20AC\u00A3]+([0-9,]+\.[0-9]{2}|[0-9,]+)/i;

        const vendor = text.match(vendorPatterns) ? text.match(vendorPatterns)[1].trim() : "Unknown / Check Header";
        const date = text.match(datePatterns) ? text.match(datePatterns)[1].trim().split('\n')[0] : "Check Text Matrix";
        const total = text.match(totalPatterns) ? text.match(totalPatterns)[1].trim() : "Not Found (Review Base)";
        const tax = text.match(taxPatterns) ? text.match(taxPatterns)[1].trim() : "0.00";

        csvContent = `Vendor,Date,Tax,Total\n"${vendor.replace(/"/g, '""')}","${date}","${tax}","${total}"`;
        
        document.getElementById('invoiceOutput').textContent = 
            `[Extracted Spreadsheet Row Mapping]\n\n` +
            `Vendor/Merchant : ${vendor}\n` +
            `Invoice Date    : ${date}\n` +
            `Identified Tax  : ${tax}\n` +
            `Total Financial Amount: ${total}`;
    }

    function downloadCSV() {
        if(!csvContent) return alert('No data available. Please upload a spreadsheet or paste an input block.');
        const blob = new Blob([csvContent], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'bookkeeping_ledger.csv');
        a.click();
    }
</script>
</body>
</html>
