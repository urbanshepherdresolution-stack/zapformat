<script>
    let imageFiles = [];

    document.getElementById('image-input').addEventListener('change', function(e) {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        imageFiles = files;
        const previewBox = document.getElementById('preview-box');
        previewBox.innerHTML = '';

        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.createElement('img');
                img.src = event.target.result;
                img.className = 'preview-img';
                previewBox.appendChild(img);
            }
            reader.readAsDataURL(file);
        });

        document.getElementById('convert-btn').disabled = false;
    });

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        
        const convertBtn = document.getElementById('convert-btn');
        convertBtn.innerText = "Compiling PDF...";
        convertBtn.disabled = true;

        // Grab all the image preview elements that already loaded on screen
        const previewImages = document.querySelectorAll('.preview-img');

        if (previewImages.length === 0) {
            alert("Please select your images first.");
            convertBtn.innerText = "Convert and Download PDF";
            convertBtn.disabled = false;
            return;
        }

        try {
            previewImages.forEach((imgElement, index) => {
                if (index > 0) {
                    pdf.addPage();
                }

                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                
                // Get original image proportions directly from the rendered element
                let imgWidth = imgElement.naturalWidth || 800;
                let imgHeight = imgElement.naturalHeight || 600;
                
                const ratio = Math.min(pageWidth / imgWidth, pageHeight / imgHeight);
                
                imgWidth *= ratio;
                imgHeight *= ratio;
                
                const x = (pageWidth - imgWidth) / 2;
                const y = (pageHeight - imgHeight) / 2;

                // Safely embed the source directly into the PDF compilation tree
                pdf.addImage(imgElement.src, 'JPEG', x, y, imgWidth, imgHeight, undefined, 'FAST');
            });

            // Trigger the native browser save execution download pipeline
            pdf.save('compiled-images.pdf');

        } catch (error) {
            console.error("PDF Generation Error:", error);
            alert("Failed to build PDF. Please check your file formats and try again.");
        }

        // Reset user interface elements back to default active parameters
        convertBtn.innerText = "Convert and Download PDF";
        convertBtn.disabled = false;
    }
</script>
